spring:
  application:
    name: curd_study
  datasource:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/coupon_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      username: root
      password: ${DB_PASSWORD}

mybatis:
      mapper-locations: classpath:mapper/*.xml
      type-aliases-package: org.example.curd_study.entity
      configuration:
        map-underscore-to-camel-case: true
server:
  port: 8080